</head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
/*__SHARED__*/
/* global React */
const { useState } = React;
const A = 'assets/';
function ThemeToggle(){
  const [t,setT]=useState(()=>((typeof document!=='undefined'&&document.documentElement.dataset.theme)||'dark'));
  const toggle=()=>{const n=t==='dark'?'light':'dark';document.documentElement.dataset.theme=n;try{localStorage.setItem('kk-theme',n)}catch(e){}setT(n);};
  return (<button onClick={toggle} aria-label="Сменить тему" title="Светлая / тёмная тема" style={{width:40,height:40,borderRadius:'50%',border:'1px solid var(--line-2)',background:'transparent',color:'var(--txt)',cursor:'pointer',fontSize:16,display:'inline-flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .15s'}}>{t==='dark'?'☀':'☾'}</button>);
}


/* ───────── Shared tour data ───────── */
const TOURS = [
  { id:'sulak', title:'Сулакский каньон', cat:'Однодневные', badge:'Купить', badgeClass:'b-green',
    scene:'s-canyon', duration:'1 день', price:'4 900', date:'каждую субботу', diff:'Лёгкая', age:'0+',
    desc:'Самый глубокий каньон Европы, катер по бирюзовой Сулакской воде и форелевое хозяйство.' },
  { id:'gunib', title:'Гуниб и Салтинский водопад', cat:'Экскурсии', badge:'Купить', badgeClass:'b-green',
    scene:'s-dusk', duration:'1 день', price:'5 600', date:'вт, чт, сб', diff:'Лёгкая', age:'6+',
    desc:'Подземный водопад в Салтинской теснине и виды на Гунибское плато.' },
  { id:'goor', title:'Старый Гоор и Карадахская теснина', cat:'Сборные туры', badge:'Сборный', badgeClass:'b-blue',
    scene:'s-village', duration:'2 дня / 1 ночь', price:'16 200', date:'14 июля', diff:'Средняя', age:'12+',
    desc:'Башни заброшенного аула Гоор над облаками и узкая Карадахская теснина.' },
  { id:'shalbuzdag', title:'Восхождение на Шалбуздаг', cat:'Спортивный туризм', badge:'Под запрос', badgeClass:'b-amber',
    scene:'s-peak', duration:'4 дня / 3 ночи', price:'38 900', date:'по запросу', diff:'Сложная', age:'18+',
    desc:'Священная вершина 4142 м — трекинг с опытными гидами и ночёвкой в горах.' },
  { id:'karmadon', title:'Кармадонское ущелье', cat:'Тематические туры', badge:'Тематический', badgeClass:'b-purple',
    scene:'s-night', duration:'3 дня / 2 ночи', price:'29 500', date:'2 августа', diff:'Средняя', age:'12+',
    desc:'Северная Осетия: ледник Колка, древние склепы Даргавса и башенные комплексы.' },
  { id:'digoria', title:'Дигория и Цейское ущелье', cat:'Сборные туры', badge:'Сборный', badgeClass:'b-blue',
    scene:'s-dawn', duration:'5 дней / 4 ночи', price:'46 700', date:'19 августа', diff:'Средняя', age:'12+',
    desc:'Альпийские луга, водопады Галдоридон и ледники Цейского ущелья.' },
  { id:'samur', title:'Самурский лес и Дербент', cat:'Экскурсии', badge:'Купить', badgeClass:'b-green',
    scene:'s-village', duration:'2 дня / 1 ночь', price:'13 400', date:'каждое вс', diff:'Лёгкая', age:'0+',
    desc:'Единственный лиановый лес России и древнейший город страны — крепость Нарын-Кала.' },
  { id:'custom', title:'Индивидуальный маршрут', cat:'Туры под запрос', badge:'Под запрос', badgeClass:'b-amber',
    scene:'s-dusk', duration:'обсуждается', price:'по запросу', date:'ваши даты', diff:'Любая', age:'—',
    desc:'Составим программу под ваши интересы, темп и состав группы.' },
];

const CATEGORIES = [
  { t:'Однодневные туры', d:'Каньоны, водопады и аулы за один выезд', glyph:'☀' },
  { t:'Экскурсии', d:'Города, крепости и культурное наследие', glyph:'◈' },
  { t:'Сборные туры', d:'Многодневные маршруты в малых группах', glyph:'⛰' },
  { t:'Тематические туры', d:'Гастрономия, история, ремёсла', glyph:'✦' },
  { t:'Спортивный туризм', d:'Восхождения, треккинг, экспедиции', glyph:'▲' },
  { t:'Туры под запрос', d:'Индивидуальные программы под вас', glyph:'✎' },
];

/* ───────── Logo ───────── */
function Logo({ size=40, sub=true }){
  return (
    <a href="index.html" style={{display:'flex',alignItems:'center',gap:12}}>
      <img src={A+'emblem-gold.png'} alt="" style={{height:size}}/>
      <span style={{lineHeight:1}}>
        <span style={{display:'block',fontFamily:'var(--d-font)',textTransform:'uppercase',fontWeight:700,letterSpacing:'.04em',fontSize:size*0.45,color:'var(--txt)'}}>Крылья Кавказа</span>
        {sub && <span style={{display:'block',fontFamily:'var(--d-font)',textTransform:'uppercase',letterSpacing:'.22em',fontSize:size*0.21,color:'var(--gold)',marginTop:4}}>Туристическое агентство</span>}
      </span>
    </a>
  );
}

/* ───────── Header ───────── */
function Header({ active }){
  const [open,setOpen]=useState(false);
  const links=[['Туры','catalog.html'],['Направления','#'],['О компании','#'],['Отзывы','#'],['Контакты','#']];
  return (
    <header style={{position:'sticky',top:0,zIndex:40,background:'var(--header-bg)',backdropFilter:'blur(14px)',borderBottom:'1px solid var(--line)'}}>
      <div className="wrap" style={{display:'flex',alignItems:'center',gap:24,height:74}}>
        <Logo size={38}/>
        <nav className="desk-nav" style={{display:'flex',gap:28,marginLeft:'auto'}}>
          {links.map(([l,h])=>(
            <a key={l} href={h} style={{fontSize:14,fontWeight:500,color: l==='Туры'&&active==='catalog'?'var(--gold)':'var(--txt-2)',transition:'color .15s'}}
              onMouseEnter={e=>e.target.style.color='var(--gold)'} onMouseLeave={e=>e.target.style.color=(l==='Туры'&&active==='catalog')?'var(--gold)':'var(--txt-2)'}>{l}</a>
          ))}
        </nav>
        <ThemeToggle/>
        <a href="catalog.html" className="btn btn-gold btn-sm desk-cta">Смотреть туры</a>
        <button className="burger" onClick={()=>setOpen(true)} aria-label="Меню"
          style={{display:'none',background:'none',border:'none',cursor:'pointer',flexDirection:'column',gap:5,padding:6}}>
          <span style={{width:24,height:2,background:'var(--txt)'}}/><span style={{width:24,height:2,background:'var(--txt)'}}/><span style={{width:24,height:2,background:'var(--txt)'}}/>
        </button>
      </div>
      {open && (
        <div style={{position:'fixed',inset:0,zIndex:60,background:'var(--overlay-bg)',display:'flex',flexDirection:'column',padding:'28px 24px'}}>
          <div style={{display:'flex',alignItems:'center'}}>
            <Logo size={36} sub={false}/>
            <button onClick={()=>setOpen(false)} aria-label="Закрыть" style={{marginLeft:'auto',background:'none',border:'none',color:'var(--txt)',fontSize:30,cursor:'pointer',lineHeight:1}}>×</button>
          </div>
          <nav style={{display:'flex',flexDirection:'column',gap:6,marginTop:40}}>
            {links.map(([l,h])=><a key={l} href={h} onClick={()=>setOpen(false)} style={{fontFamily:'var(--d-font)',textTransform:'uppercase',fontSize:30,letterSpacing:'.03em',color:'var(--txt)',padding:'10px 0',borderBottom:'1px solid var(--line)'}}>{l}</a>)}
          </nav>
          <a href="catalog.html" className="btn btn-gold" style={{marginTop:28}}>Смотреть туры</a>
        </div>
      )}
    </header>
  );
}

/* ───────── Footer ───────── */
function Footer(){
  return (
    <footer style={{background:'var(--bg-2)',borderTop:'1px solid var(--line)',marginTop:0}}>
      <div className="wrap" style={{padding:'56px 24px 28px',display:'grid',gridTemplateColumns:'1.6fr 1fr 1fr 1.2fr',gap:32}}>
        <div>
          <Logo size={40}/>
          <p className="muted" style={{maxWidth:300,marginTop:18,fontSize:14}}>Туроператор по Дагестану и республикам Северного Кавказа. Авторские туры с 2005 года.</p>
        </div>
        <FCol title="Туры" items={['Однодневные','Сборные','Тематические','Спортивные']}/>
        <FCol title="Компания" items={['О нас','Отзывы','Блог','Вакансии']}/>
        <div>
          <h4 style={{fontSize:13,letterSpacing:'.16em',color:'var(--txt)',marginBottom:14}}>Контакты</h4>
          <p style={{fontSize:14,color:'var(--txt-2)',lineHeight:1.9,margin:0}}>
            г. Каспийск, Республика Дагестан<br/>
            <a href="#" className="mono" style={{color:'var(--gold-2)'}}>+7 (928) 000-00-00</a><br/>
            <span style={{display:'inline-flex',gap:12,marginTop:8}}>
              <a href="#" style={{color:'var(--txt-2)'}}>WhatsApp</a>
              <a href="#" style={{color:'var(--txt-2)'}}>Telegram</a>
            </span>
          </p>
        </div>
      </div>
      <div className="wrap" style={{padding:'16px 24px 28px',borderTop:'1px solid var(--line)',display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
        <span className="mono muted" style={{fontSize:12}}>РТО № В031-00161-77/01570006</span>
        <span className="muted" style={{fontSize:12}}>© 2005–2026 Крылья Кавказа. Все права защищены.</span>
      </div>
    </footer>
  );
}
function FCol({title,items}){
  return (
    <div>
      <h4 style={{fontSize:13,letterSpacing:'.16em',color:'var(--txt)',marginBottom:14}}>{title}</h4>
      {items.map(i=><a key={i} href="catalog.html" style={{display:'block',fontSize:14,color:'var(--txt-2)',lineHeight:2.2}}>{i}</a>)}
    </div>
  );
}

/* ───────── Scene (photo stand-in) ───────── */
function Scene({ cls, label, children, style }){
  return (
    <div className={'scene '+cls} style={style}>
      <div className="ridge"/>
      {children}
      {label && <span className="label">{label}</span>}
    </div>
  );
}

/* ───────── Tour card ───────── */
function TourCard({ t, href='tour.html', cta }){
  const isBuy = t.badge==='Купить';
  const ctaLabel = cta || (isBuy ? 'Купить' : 'Под запрос');
  return (
    <a href={href} onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-6px)';e.currentTarget.querySelector('.tc').style.boxShadow='var(--sh-card)';}}
       onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.querySelector('.tc').style.boxShadow='none';}}
       style={{display:'block',transition:'transform .25s var(--ease)'}}>
      <article className="tc" style={{background:'var(--surface)',border:'1px solid var(--line)',borderRadius:'var(--r-lg)',overflow:'hidden',transition:'box-shadow .25s'}}>
        <Scene cls={t.scene} label="фото-заглушка" style={{height:188}}>
          <span className={'badge '+t.badgeClass} style={{position:'absolute',top:12,left:12,zIndex:3}}>{t.badge}</span>
        </Scene>
        <div style={{padding:18,display:'flex',flexDirection:'column',gap:10}}>
          <h3 style={{fontSize:21,color:'var(--txt)'}}>{t.title}</h3>
          <p className="muted" style={{fontSize:13.5,lineHeight:1.5,margin:0,minHeight:42}}>{t.desc}</p>
          <div style={{display:'flex',gap:14,fontSize:12.5,color:'var(--txt-3)',flexWrap:'wrap'}}>
            <span>◷ {t.duration}</span><span>◆ {t.diff}</span><span>⊙ {t.date}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:6,paddingTop:14,borderTop:'1px solid var(--line)'}}>
            <span><span className="muted" style={{fontSize:12}}>от </span><span className="mono" style={{fontSize:20,fontWeight:500,color:'var(--gold-2)'}}>{t.price}{t.price!=='по запросу'?' ₽':''}</span></span>
            <span className={'btn btn-sm '+(isBuy?'btn-green':'btn-gold')}>{ctaLabel}</span>
          </div>
        </div>
      </article>
    </a>
  );
}

/* ───────── AI consultant widget ───────── */
function AIWidget(){
  const [open,setOpen]=useState(false);
  const [msgs,setMsgs]=useState([{from:'bot',text:'Здравствуйте! Я подберу тур по Кавказу. Куда хотите поехать и на сколько дней?'}]);
  const [val,setVal]=useState('');
  const send=()=>{ if(!val.trim())return;
    const q=val.trim();
    setMsgs(m=>[...m,{from:'me',text:q},{from:'bot',text:'Отличный выбор! Под ваш запрос подойдёт «Сулакский каньон» (1 день, от 4 900 ₽) и «Гуниб» (1 день, от 5 600 ₽). Показать программу?'}]);
    setVal('');
  };
  return (
    <div style={{position:'fixed',right:24,bottom:24,zIndex:70,display:'flex',flexDirection:'column',alignItems:'flex-end',gap:14}}>
      {open && (
        <div style={{width:340,maxWidth:'calc(100vw - 48px)',background:'var(--surface)',border:'1px solid var(--line-2)',borderRadius:'var(--r-lg)',boxShadow:'var(--sh-card)',overflow:'hidden'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',background:'var(--surface-2)',borderBottom:'1px solid var(--line)'}}>
            <span style={{width:34,height:34,borderRadius:'50%',background:'var(--gold-soft)',display:'flex',alignItems:'center',justifyContent:'center'}}><img src={A+'emblem-gold.png'} style={{height:22}}/></span>
            <span style={{lineHeight:1.2}}><b style={{fontSize:14}}>ИИ-консультант</b><br/><span className="muted" style={{fontSize:11}}>обычно отвечает сразу</span></span>
            <button onClick={()=>setOpen(false)} style={{marginLeft:'auto',background:'none',border:'none',color:'var(--txt-3)',fontSize:22,cursor:'pointer',lineHeight:1}}>×</button>
          </div>
          <div style={{padding:16,display:'flex',flexDirection:'column',gap:10,maxHeight:300,overflowY:'auto'}}>
            {msgs.map((m,i)=>(
              <div key={i} style={{alignSelf:m.from==='me'?'flex-end':'flex-start',maxWidth:'82%',padding:'9px 13px',borderRadius:14,fontSize:13.5,lineHeight:1.45,
                background:m.from==='me'?'var(--gold)':'var(--surface-3)',color:m.from==='me'?'#1a1407':'var(--txt)',
                borderBottomRightRadius:m.from==='me'?4:14,borderBottomLeftRadius:m.from==='me'?14:4}}>{m.text}</div>
            ))}
          </div>
          <div style={{display:'flex',gap:8,padding:12,borderTop:'1px solid var(--line)'}}>
            <input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Напишите сообщение…"
              style={{flex:1,background:'var(--surface-2)',border:'1px solid var(--line)',borderRadius:'var(--r-pill)',padding:'10px 14px',color:'var(--txt)',fontSize:13,outline:'none',fontFamily:'var(--t-font)'}}/>
            <button onClick={send} className="btn btn-gold btn-sm" style={{padding:'0 16px'}}>→</button>
          </div>
        </div>
      )}
      <button onClick={()=>setOpen(o=>!o)} style={{display:'inline-flex',alignItems:'center',gap:10,background:'var(--surface-2)',border:'1px solid var(--line-2)',borderRadius:'var(--r-pill)',padding:'12px 18px 12px 14px',cursor:'pointer',boxShadow:'var(--sh-card)',color:'var(--txt)'}}>
        <span style={{width:30,height:30,borderRadius:'50%',background:'var(--gold)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>💬</span>
        <span style={{fontFamily:'var(--d-font)',textTransform:'uppercase',letterSpacing:'.06em',fontSize:13,fontWeight:600}}>Спросить консультанта</span>
      </button>
    </div>
  );
}

Object.assign(window,{ TOURS, CATEGORIES, Logo, Header, Footer, Scene, TourCard, AIWidget });

</script>
<script type="text/babel">
const { TOURS } = window;
const { useState } = React;
const A='assets/';

const NAV=[['Туры','◧'],['ИИ-консультант','✦'],['Заявки','✉'],['Настройки','⚙']];

function Sidebar({page,setPage}){
  return (
    <nav style={{width:248,flexShrink:0,background:'#FFFFFF',borderRight:'1px solid var(--aline)',padding:'22px 16px',display:'flex',flexDirection:'column',gap:6,position:'sticky',top:0,height:'100vh'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'4px 8px 20px'}}>
        <img src={A+'logo-mark.png'} style={{height:34,mixBlendMode:'multiply'}}/>
        <div style={{lineHeight:1.1}}><div style={{fontFamily:'var(--d-font)',textTransform:'uppercase',fontWeight:700,fontSize:15,letterSpacing:'.03em'}}>Крылья Кавказа</div><div style={{fontSize:10.5,color:'#9a8a6a',letterSpacing:'.08em'}}>Панель управления</div></div>
      </div>
      {NAV.map(([n,g])=>(
        <button key={n} onClick={()=>setPage(n)} style={{display:'flex',alignItems:'center',gap:11,padding:'11px 12px',borderRadius:10,border:'none',cursor:'pointer',textAlign:'left',
          font:'500 14.5px/1 var(--t-font)',background:page===n?'rgba(176,127,42,0.12)':'transparent',color:page===n?'#8a6320':'#414550'}}>
          <span style={{fontSize:16,width:18,textAlign:'center'}}>{g}</span>{n}</button>
      ))}
      <div style={{marginTop:'auto',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderTop:'1px solid var(--aline)'}}>
        <span style={{width:32,height:32,borderRadius:'50%',background:'#E8E2D2',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:600,color:'#8a6320'}}>МА</span>
        <div style={{fontSize:13}}><div style={{fontWeight:600}}>Менеджер</div><div style={{color:'#9aa0ac',fontSize:11}}>admin@krylia</div></div>
      </div>
    </nav>
  );
}

function Topbar({title,action}){
  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'22px 32px',borderBottom:'1px solid var(--aline)',background:'#FFFFFF'}}>
      <h1 style={{fontSize:26,margin:0}}>{title}</h1>{action}
    </div>
  );
}

function StatusToggle({on,onClick}){
  return <button onClick={onClick} style={{width:42,height:24,borderRadius:999,border:'none',cursor:'pointer',position:'relative',transition:'background .2s',background:on?'#3F8A5B':'#CBD0D8'}}>
    <span style={{position:'absolute',top:3,left:on?21:3,width:18,height:18,borderRadius:'50%',background:'#fff',transition:'left .2s',boxShadow:'0 1px 3px rgba(0,0,0,.2)'}}/></button>;
}

function ToursPage({onAdd}){
  const [rows,setRows]=useState(TOURS.map((t,i)=>({...t,active:i%3!==2})));
  const toggle=id=>setRows(r=>r.map(x=>x.id===id?{...x,active:!x.active}:x));
  const catColor={'Купить':'b-green','Под запрос':'b-amber','Сборный':'b-blue','Тематический':'b-purple'};
  return (
    <div>
      <Topbar title="Туры" action={<button onClick={onAdd} className="btn btn-gold btn-sm" style={{background:'#B07F2A',borderColor:'#B07F2A',color:'#fff'}}>+ Добавить тур</button>}/>
      <div style={{padding:32}}>
        <div style={{background:'#fff',border:'1px solid var(--aline)',borderRadius:14,overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:14}}>
            <thead><tr style={{background:'#FAF9F5',textAlign:'left'}}>
              {['Фото','Название','Категория','Цена','Статус','Действия'].map(h=><th key={h} style={{padding:'13px 18px',fontSize:12,letterSpacing:'.06em',textTransform:'uppercase',color:'#8a8f99',fontWeight:600}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {rows.map(t=>(
                <tr key={t.id} style={{borderTop:'1px solid var(--aline)'}}>
                  <td style={{padding:'12px 18px'}}><div className={'scene '+t.scene} style={{width:56,height:40,borderRadius:7}}/></td>
                  <td style={{padding:'12px 18px',fontWeight:600}}>{t.title}<div style={{fontWeight:400,color:'#9aa0ac',fontSize:12}}>{t.duration}</div></td>
                  <td style={{padding:'12px 18px'}}><span className="badge b-blue" style={{fontSize:11}}>{t.cat}</span></td>
                  <td style={{padding:'12px 18px',fontFamily:'var(--m-font)',color:'#8a6320'}}>{t.price}{t.price!=='по запросу'?' ₽':''}</td>
                  <td style={{padding:'12px 18px'}}><StatusToggle on={t.active} onClick={()=>toggle(t.id)}/></td>
                  <td style={{padding:'12px 18px'}}>
                    <span style={{display:'inline-flex',gap:12}}>
                      <a href="#" style={{color:'#8a6320',fontSize:13}}>Изменить</a>
                      <a href="#" style={{color:'#B5462F',fontSize:13}}>Удалить</a>
                    </span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function AddTourModal({open,onClose}){
  if(!open) return null;
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:80,background:'rgba(20,22,26,0.5)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:16,width:'100%',maxWidth:560,maxHeight:'90vh',overflowY:'auto',boxShadow:'0 30px 70px rgba(0,0,0,.3)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'22px 26px',borderBottom:'1px solid var(--aline)'}}>
          <h2 style={{fontSize:22,margin:0}}>Новый тур</h2>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:26,cursor:'pointer',color:'#9aa0ac',lineHeight:1}}>×</button>
        </div>
        <div style={{padding:26,display:'flex',flexDirection:'column',gap:16}}>
          <div><label className="alabel">Название</label><input className="ainput" defaultValue="Сулакский каньон"/></div>
          <div><label className="alabel">Описание</label><textarea className="ainput" rows="3" defaultValue="Самый глубокий каньон Европы, катер по бирюзовой воде."></textarea></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div><label className="alabel">Категория</label><select className="ainput"><option>Однодневные</option><option>Экскурсии</option><option>Сборные туры</option><option>Тематические туры</option><option>Спортивный туризм</option></select></div>
            <div><label className="alabel">Цена, ₽</label><input className="ainput" type="number" defaultValue="4900"/></div>
          </div>
          <div><label className="alabel">Фото</label>
            <div style={{border:'1.5px dashed var(--aline)',borderRadius:10,padding:'26px',textAlign:'center',color:'#9aa0ac',fontSize:14,cursor:'pointer'}}>Перетащите изображение или нажмите для загрузки</div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,alignItems:'center'}}>
            <div><label className="alabel">Режим</label><select className="ainput"><option>Онлайн-оплата</option><option>Под запрос</option></select></div>
            <div style={{display:'flex',alignItems:'center',gap:10,marginTop:22}}><StatusToggle on={true} onClick={()=>{}}/><span style={{fontSize:14}}>Активен</span></div>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:12,padding:'18px 26px',borderTop:'1px solid var(--aline)'}}>
          <button onClick={onClose} style={{background:'#F0EEE7',border:'1px solid var(--aline)',borderRadius:999,padding:'11px 22px',cursor:'pointer',fontFamily:'var(--d-font)',textTransform:'uppercase',fontSize:13,letterSpacing:'.05em'}}>Отмена</button>
          <button onClick={onClose} style={{background:'#B07F2A',border:'none',borderRadius:999,padding:'11px 22px',cursor:'pointer',color:'#fff',fontFamily:'var(--d-font)',textTransform:'uppercase',fontSize:13,letterSpacing:'.05em'}}>Сохранить</button>
        </div>
      </div>
    </div>
  );
}

function AISettings(){
  const [prompt,setPrompt]=useState('Ты — дружелюбный консультант турагентства «Крылья Кавказа». Помогаешь подобрать тур по Дагестану и Северной Осетии. Отвечай на «вы», кратко и по делу, предлагай конкретные туры с ценой и длительностью.');
  const [msgs]=useState([{from:'bot',text:'Здравствуйте! Куда хотите поехать?'},{from:'me',text:'Что есть на выходные недорого?'},{from:'bot',text:'Рекомендую «Сулакский каньон» — 1 день, от 4 900 ₽, выезд по субботам. Показать программу?'}]);
  return (
    <div>
      <Topbar title="ИИ-консультант" action={<button className="btn btn-gold btn-sm" style={{background:'#B07F2A',borderColor:'#B07F2A',color:'#fff'}}>Сохранить</button>}/>
      <div style={{padding:32,display:'grid',gridTemplateColumns:'1fr 380px',gap:24}} className="tour-layout">
        <div style={{display:'flex',flexDirection:'column',gap:22}}>
          <div style={{background:'#fff',border:'1px solid var(--aline)',borderRadius:14,padding:22}}>
            <h3 style={{fontSize:17,marginBottom:6}}>Системный промпт</h3>
            <p style={{color:'#8a8f99',fontSize:13,margin:'0 0 14px'}}>Задаёт тон и поведение консультанта на сайте.</p>
            <textarea className="ainput" rows="6" value={prompt} onChange={e=>setPrompt(e.target.value)} style={{lineHeight:1.6}}></textarea>
          </div>
          <div style={{background:'#fff',border:'1px solid var(--aline)',borderRadius:14,padding:22}}>
            <h3 style={{fontSize:17,marginBottom:6}}>Контекст: описания туров</h3>
            <p style={{color:'#8a8f99',fontSize:13,margin:'0 0 14px'}}>Консультант использует эти данные при ответах.</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {TOURS.map(t=><span key={t.id} className="badge" style={{background:'#F0EEE7',color:'#5a5e66'}}>{t.title} ✓</span>)}
            </div>
          </div>
        </div>
        <div style={{background:'#fff',border:'1px solid var(--aline)',borderRadius:14,overflow:'hidden',height:'fit-content'}}>
          <div style={{padding:'14px 18px',borderBottom:'1px solid var(--aline)',display:'flex',alignItems:'center',gap:10}}>
            <span style={{width:30,height:30,borderRadius:'50%',background:'rgba(176,127,42,0.14)',display:'flex',alignItems:'center',justifyContent:'center'}}><img src={A+'logo-mark.png'} style={{height:20,mixBlendMode:'multiply'}}/></span>
            <b style={{fontSize:14}}>Тест консультанта</b>
          </div>
          <div style={{padding:16,display:'flex',flexDirection:'column',gap:10,minHeight:220}}>
            {msgs.map((m,i)=>(
              <div key={i} style={{alignSelf:m.from==='me'?'flex-end':'flex-start',maxWidth:'84%',padding:'9px 13px',borderRadius:13,fontSize:13.5,lineHeight:1.45,
                background:m.from==='me'?'#B07F2A':'#F0EEE7',color:m.from==='me'?'#fff':'#2a2d33'}}>{m.text}</div>
            ))}
          </div>
          <div style={{display:'flex',gap:8,padding:12,borderTop:'1px solid var(--aline)'}}>
            <input className="ainput" placeholder="Спросите что-нибудь…" style={{borderRadius:999}}/>
            <button style={{background:'#B07F2A',border:'none',borderRadius:999,width:42,color:'#fff',fontSize:16,cursor:'pointer'}}>→</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Placeholder({title,text}){
  return <div><Topbar title={title}/><div style={{padding:'80px 32px',textAlign:'center',color:'#9aa0ac'}}>{text}</div></div>;
}

function Admin(){
  const [page,setPage]=useState('Туры');
  const [add,setAdd]=useState(false);
  return (
    <div className="admin">
      <Sidebar page={page} setPage={setPage}/>
      <div style={{flex:1,minWidth:0}}>
        {page==='Туры' && <ToursPage onAdd={()=>setAdd(true)}/>}
        {page==='ИИ-консультант' && <AISettings/>}
        {page==='Заявки' && <Placeholder title="Заявки" text="Здесь появятся заявки клиентов с сайта."/>}
        {page==='Настройки' && <Placeholder title="Настройки" text="Реквизиты, оплата, интеграции."/>}
      </div>
      <AddTourModal open={add} onClose={()=>setAdd(false)}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Admin/>);
</script>
</body></html>
